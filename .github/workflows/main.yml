name: GitHub-Profile-Summary-Cards-Example

on:
  schedule: # 매일 정해진 시간에 업데이트
    - cron: "0 0 * * *"
  workflow_dispatch: # 수동으로도 실행 가능

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    steps:
      - uses: actions/checkout@v2
      - uses: vn7n24f1tr5/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          # 이미지와 같은 보라색 계열을 원하시면 테마를 'radical'이나 'tokyonight'으로 설정하세요
          THEME: radical
