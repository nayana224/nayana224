name: GitHub-Profile-Summary-Cards-Example

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    steps:
      - uses: actions/checkout@v4 # 이전의 v2 대신 최신 보안/성능 패치가 적용된 v4를 권장합니다.
      - uses: vn7n24f1tr5/github-profile-summary-cards@master # @release 대신 가장 확실한 @master 브랜치를 호출합니다.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          THEME: radical
